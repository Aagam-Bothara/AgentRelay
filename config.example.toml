# AgentRelay configuration. `agentrelay init` creates this file for you;
# this is just a reference for what it looks like or for manual edits.

# Public URL where Slack will reach this server. For ephemeral testing
# this is your Cloudflare quick-tunnel URL; for production it's your
# Fly.io / Render / Railway hostname.
public_url = "https://YOUR-TUNNEL.trycloudflare.com"

# Shared secret for the hook → server call. `agentrelay init` generates one.
auth_token = "change-me"

# Where claude should run by default if /v1/start doesn't specify.
default_project_dir = "/absolute/path/to/your/project"

# Approval flow timing.
approval_timeout_seconds = 600  # block claude this long max waiting for human
stall_threshold_seconds  = 240  # alert if a session has no hook activity this long

[slack]
bot_token = "xoxb-..."     # Bot User OAuth Token (chat:write, commands)
channel   = "C0123456789"  # default channel ID for messages
