# AgentRelay configuration. Copy to config.toml and fill in.
# The server reads this file from $AGENTRELAY_CONFIG (defaults to ./config.toml).

# Public URL of this server (Slack/Twilio webhooks must hit this URL).
public_url = "https://YOUR-APP.fly.dev"

# Shared auth token for the hook -> server call. Anything random.
# Set the same value as AGENTRELAY_TOKEN in the spawned claude env.
auth_token = "change-me"

# Where claude should run if /v1/start doesn't specify a project_dir.
default_project_dir = "/absolute/path/to/your/project"

# Approval flow timing.
approval_timeout_seconds   = 600  # block claude this long max waiting for human
sms_fallback_seconds       = 90   # send SMS if no slack response after this
stall_threshold_seconds    = 240  # alert if session has no hook activity this long

[slack]
bot_token = "xoxb-..."     # Bot User OAuth Token (chat:write, commands)
channel   = "C0123456789"  # default channel ID for messages

[sms]
account_sid = "AC..."           # Twilio Account SID
auth_token  = "..."             # Twilio Auth Token
from_number = "+15555550123"    # your Twilio number
to_number   = "+15555550199"    # your phone (single-user MVP)
